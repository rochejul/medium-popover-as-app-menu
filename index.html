<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Medium - use the Popover api to create an application menu</title>
    <link rel="stylesheet" href="./app.css" />
    <script type="module" src="./app.js"></script>
  </head>

  <body>
    <div class="menu">
      <button popovertarget="mainpopover">Menu</button>
      <div id="mainpopover" popover="auto" class="menu__mainpopover">
        <nav class="menu__listcontainer">
          <a href="#">Pizza</a>
          <a href="#">Music</a>
          <a href="#">Wombats</a>
          <a href="#">Finland</a>
          <div class="menu__subcontainer">
            <a href="#" tabindex="0">Pizza</a>
            <div popover="auto">
              <div class="menu__listcontainer">
                <a href="#">Margherita</a>
                <a href="#">Pepperoni</a>
                <a href="#">Ham &amp; Shroom</a>
                <a href="#">Vegan</a>
              </div>
            </div>
          </div>
        </nav>
      </div>
    </div>
  </body>
</html>
